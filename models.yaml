# ── Model & Provider Registry ─────────────────────────────────────────────
# Single source of truth for every model and provider the proxy knows about.
#
# To add a model:   add an entry under its provider's `models` list.
# To add a provider: add a new top-level key under `providers`.
#
# No code changes needed — the proxy reads this file at startup.

providers:
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    timeout_seconds: 120
    adapter: "deepseek"
    models:
      - id: "deepseek-chat"
        reasoning: false
      - id: "deepseek-reasoner"
        reasoning: true
        reasoning_field: "reasoning_content"
      - id: "deepseek-r1"
        reasoning: true
        reasoning_field: "reasoning_content"
      - id: "deepseek-v4-pro"
        reasoning: true
        reasoning_field: "reasoning_content"
      - id: "deepseek-v4-flash"
        reasoning: true
        reasoning_field: "reasoning_content"
      - id: "deepseek-v3"
        reasoning: false

  openai:
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    timeout_seconds: 120
    adapter: "openai"
    models:
      - id: "gpt-4o"
        reasoning: false
      - id: "gpt-4o-mini"
        reasoning: false
      - id: "gpt-4.1"
        reasoning: false
      - id: "gpt-4.1-mini"
        reasoning: false
      - id: "o1"
        reasoning: true
        reasoning_field: "reasoning_content"
      - id: "o3"
        reasoning: true
        reasoning_field: "reasoning_content"
      - id: "o4-mini"
        reasoning: true
        reasoning_field: "reasoning_content"
      - id: "o3-mini"
        reasoning: true
        reasoning_field: "reasoning_content"

  anthropic:
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    timeout_seconds: 120
    adapter: "anthropic"
    thinking_enabled: true
    thinking_budget_tokens: 5000
    models:
      - id: "claude-3-5-sonnet-20241022"
        reasoning: true
        reasoning_field: "thinking"
      - id: "claude-3-7-sonnet-20250219"
        reasoning: true
        reasoning_field: "thinking"
      - id: "claude-sonnet-4-6-20250514"
        reasoning: true
        reasoning_field: "thinking"
      - id: "claude-opus-4-7-20250609"
        reasoning: true
        reasoning_field: "thinking"
      - id: "claude-haiku-4-5-20251001"
        reasoning: true
        reasoning_field: "thinking"

  chutes:
    base_url: "https://llm.chutes.ai/v1"
    api_key_env: "CHUTES_API_KEY"
    timeout_seconds: 120
    adapter: "chutes"
    models:
      - id: "Qwen/Qwen3-32B-TEE"
        reasoning: false
      - id: "zai-org/GLM-5-TEE"
        reasoning: false
      - id: "Qwen/Qwen2.5-VL-32B-Instruct"
        reasoning: false
      - id: "deepseek-ai/DeepSeek-V3.1-TEE"
        reasoning: false

  passthrough:
    base_url: "http://localhost:11434/v1"
    api_key_env: ""
    timeout_seconds: 60
    adapter: "passthrough"
    models:
      - id: "default"
        reasoning: false
